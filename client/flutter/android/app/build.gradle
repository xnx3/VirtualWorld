apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'dev.flutter.flutter-gradle-plugin'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.virtualworld.genesis"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.virtualworld.genesis"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // 支持 ARM 和 x86
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

// 复制 Genesis 文件到 assets
task copyGenesisAssets(type: Copy) {
    description = 'Copy Genesis backend files to Android assets'
    from '../../../genesis'
    into 'src/main/assets/genesis'
    exclude '**/__pycache__/**'
    exclude '**/*.pyc'
}

task copyTermuxScripts(type: Copy) {
    description = 'Copy Termux scripts to Android assets'
    from '../../../termux'
    into 'src/main/assets'
    include 'start_genesis.sh'
    include 'install.sh'
}

task copyConfigExample(type: Copy) {
    description = 'Copy config example to Android assets'
    from '../../../config.yaml.example'
    into 'src/main/assets'
}

preBuild.dependsOn copyGenesisAssets
preBuild.dependsOn copyTermuxScripts
preBuild.dependsOn copyConfigExample

flutter {
    source '../..'
}

dependencies {}