apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'dev.flutter.flutter-gradle-plugin'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def repoRootDir = file('../../../../')
def flutterRootDir = file('../../')
def generatedRuntimeAssetsDir = file("$buildDir/generated/runtime-assets/main")

android {
    namespace "com.virtualworld.genesis"
    compileSdk flutter.compileSdkVersion
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main {
            java.srcDirs += 'src/main/kotlin'
            assets.srcDirs += generatedRuntimeAssetsDir
        }
    }

    defaultConfig {
        applicationId "com.virtualworld.genesis"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // 支持 ARM 和 x86
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

task prepareGeneratedRuntimeAssets {
    description = 'Reset generated Android runtime assets directory'
    outputs.upToDateWhen { false }
    doLast {
        delete generatedRuntimeAssetsDir
        mkdir generatedRuntimeAssetsDir
    }
}

// 复制 Genesis 文件到构建生成目录，避免在源码目录维护镜像副本
task copyGenesisAssets(type: Copy) {
    description = 'Copy Genesis backend files to generated Android assets'
    dependsOn prepareGeneratedRuntimeAssets
    from "${repoRootDir}/genesis"
    into "${generatedRuntimeAssetsDir}/genesis"
    exclude '**/__pycache__/**'
    exclude '**/*.pyc'
}

task copyTermuxScripts(type: Copy) {
    description = 'Copy Termux scripts to generated Android assets'
    dependsOn prepareGeneratedRuntimeAssets
    from "${repoRootDir}/termux"
    into generatedRuntimeAssetsDir
    include 'start_genesis.sh'
    include 'install.sh'
    include 'quick_install.sh'
}

task copyConfigExample(type: Copy) {
    description = 'Copy config example to generated Android assets'
    dependsOn prepareGeneratedRuntimeAssets
    from "${repoRootDir}/config.yaml.example"
    into generatedRuntimeAssetsDir
}

task copyBundledTermuxApks(type: Copy) {
    description = 'Copy bundled Termux APKs from Flutter assets to generated Android assets'
    dependsOn prepareGeneratedRuntimeAssets
    from "${flutterRootDir}/assets"
    into generatedRuntimeAssetsDir
    include 'termux-*.apk'
}

task copyTermuxBundle(type: Copy) {
    description = 'Copy prebuilt Genesis Termux bundle to generated Android assets (if exists)'
    dependsOn prepareGeneratedRuntimeAssets
    from "${repoRootDir}/termux"
    into generatedRuntimeAssetsDir
    include 'genesis-termux-bundle.tar.gz'
    include 'genesis-termux-bundle.tar.gz.sha256'
    onlyIf {
        file("${repoRootDir}/termux/genesis-termux-bundle.tar.gz").exists()
    }
}

task generateAndroidRuntimeAssets {
    description = 'Generate Android runtime assets from single-source project files'
    dependsOn copyGenesisAssets
    dependsOn copyTermuxScripts
    dependsOn copyConfigExample
    dependsOn copyBundledTermuxApks
    dependsOn copyTermuxBundle
}

preBuild.dependsOn generateAndroidRuntimeAssets

gradle.buildFinished {
    if (generatedRuntimeAssetsDir.exists()) {
        delete generatedRuntimeAssetsDir
    }
}

flutter {
    source '../..'
}

dependencies {}
